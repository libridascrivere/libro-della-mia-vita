<title>Il Libro della Mia Vita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#5a6e57;--sage-l:#8a9e85;--sage-d:#3d4f3b;
  --bg:#f4efe9;--paper:#faf7f3;--ink:#2a2820;
  --ink2:#5a5548;--ink3:#8a847a;--line:#ddd7cf;--accent:#c4a882;
}
html{font-size:16px}
body{font-family:'Jost',sans-serif;background:#edf0e6;color:#181d10;margin:0;padding:0}

/* COVER — fedele alla copertina del libro fisico */
#pg-cover{min-height:100vh;min-height:100dvh;background:#d8e1c4;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 32px 80px;position:relative;overflow:hidden}
.cv-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,10vw,4.4rem);font-weight:400;line-height:1.08;color:#181d10;letter-spacing:.01em;text-transform:uppercase;margin-bottom:0}
.cv-line{width:80px;height:1px;background:#929b80;margin:18px auto 20px}
.cv-sub{font-family:'Jost',sans-serif;font-size:clamp(.82rem,2.8vw,.95rem);font-weight:300;line-height:1.75;color:#181d10;max-width:240px;margin:0 auto 36px}
.cv-btn{display:inline-block;padding:11px 30px;border:1px solid #929b80;background:transparent;color:#181d10;font-family:'Jost',sans-serif;font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;margin-bottom:0}
.cv-bottom{position:absolute;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:0}
.cv-bottom-logo{width:180px;height:auto}

/* APP */
#pg-app{display:none;min-height:100vh;min-height:100dvh}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;gap:8px;padding:0 10px;background:rgba(216,225,196,.97);border-bottom:1px solid #b8c4a4;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.tb-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:8px;color:#3d4a30;font-size:1.1rem;flex-shrink:0;font-family:'Jost',sans-serif}
.tb-title{flex:1;text-align:center;font-family:'Cormorant Garamond',serif;font-size:1rem;color:#181d10;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(216,225,196,.97);border-top:1px solid #b8c4a4;display:flex;justify-content:space-around;align-items:center;padding:6px 4px;padding-bottom:max(6px,env(safe-area-inset-bottom));-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.bn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;border:none;background:transparent;cursor:pointer;font-size:.58rem;color:#5a6648;font-family:'Jost',sans-serif;border-radius:8px}
.bn.on{color:#181d10;font-weight:500}
.bn-ic{font-size:1.25rem;line-height:1}

.content{padding-bottom:80px}

/* HOME */
.home{padding:36px 20px;text-align:center}
.h-title{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:400;line-height:1.1;color:#181d10;text-transform:uppercase;letter-spacing:.02em}
.h-div{width:40px;height:1.5px;background:#929b80;margin:18px auto}
.h-sub{font-family:'Jost',sans-serif;font-style:normal;font-size:.88rem;font-weight:300;color:#181d10;line-height:1.75;max-width:270px;margin:0 auto 28px}
.btn-p{display:inline-block;padding:11px 28px;border-radius:0;border:1px solid #929b80;background:transparent;color:#181d10;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;margin:5px}
.btn-o{display:inline-block;padding:11px 28px;border-radius:0;border:1px solid #c4cdb0;background:transparent;color:#4a5a3e;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;margin:5px}

/* CHAPTERS */
.ch-list{padding:20px 16px}
.cl-h{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;margin-bottom:4px}
.cl-s{font-size:.76rem;color:#929b80;margin-bottom:18px}
.card{display:flex;align-items:center;gap:14px;background:#edf0e6;border:1px solid #c4cdb0;border-radius:10px;padding:13px 16px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card:active{background:#f0ebe3}
.c-num{width:34px;height:34px;border-radius:50%;background:#edf0e6;border:1px solid #c4cdb0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:500;color:#3d4a30;flex-shrink:0}
.c-num.done{background:#929b80;color:#fff;border-color:#929b80}
.c-info{flex:1;min-width:0}
.c-name{font-size:.9rem;color:#181d10}
.c-desc{font-size:.74rem;color:#929b80;margin-top:2px;font-style:italic}
.c-arr{color:#929b80;font-size:1rem;flex-shrink:0}

/* CHAPTER DETAIL */
.ch-hero{color:#fff;padding:28px 20px 24px;position:relative;overflow:hidden}
.ch-hero::before{content:'';position:absolute;top:-50px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
.ch-num-lbl{font-size:.67rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:8px}
.ch-title-lbl{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;line-height:1.15;margin-bottom:14px}
.ch-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;line-height:1.65;color:rgba(255,255,255,.8);border-left:2px solid #929b80;padding-left:12px}
.ch-qs{background:#edf0e6;padding:16px 20px;border-bottom:1px solid #c4cdb0}
.qs-lbl{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:#929b80;font-weight:500;margin-bottom:10px}
.q-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.q-dot{width:5px;height:5px;border-radius:50%;background:#929b80;flex-shrink:0;margin-top:7px}
.q-txt{font-size:.87rem;line-height:1.5;color:#3d4a30}
.write-wrap{padding:14px 16px}
.write-card{background:#edf0e6;border:1px solid #c4cdb0;border-radius:10px;overflow:hidden;margin-bottom:12px}
.write-hd{padding:10px 14px;background:#f0ebe3;border-bottom:1px solid #c4cdb0;display:flex;justify-content:space-between;align-items:center}
.wh-lbl{font-size:.67rem;letter-spacing:.12em;text-transform:uppercase;color:#929b80;font-weight:500}
.wh-cc{font-size:.67rem;color:#929b80}
.ta{display:block;width:100%;min-height:180px;padding:12px 14px;border:none;outline:none;background:transparent;resize:vertical;font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.85;color:#181d10;caret-color:#929b80;background-image:repeating-linear-gradient(transparent,transparent 29px,#c4cdb0 29px,#c4cdb0 30px);background-attachment:local}
.ta::placeholder{color:#929b80;font-style:italic}
.save-row{padding:0 16px 16px}
.save-btn{padding:11px 32px;border-radius:0;border:1px solid #929b80;background:transparent;color:#181d10;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
.nav-row{display:flex;gap:10px;padding:0 16px 32px}
.nav-prev{flex:1;padding:11px;border-radius:8px;border:1px solid #c4cdb0;background:transparent;cursor:pointer;font-family:'Jost',sans-serif;font-size:.82rem;color:#3d4a30}
.nav-next{flex:1;padding:11px;border-radius:8px;border:none;background:#929b80;color:#fff;cursor:pointer;font-family:'Jost',sans-serif;font-size:.82rem}

/* STATIC */
.static-pg{max-width:600px;margin:0 auto;padding:28px 20px 40px}
.st-h{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;margin-bottom:6px}
.st-div{width:36px;height:1.5px;background:#929b80;margin-bottom:20px}
.st-body{font-size:.93rem;line-height:1.85;color:#3d4a30}
.st-body p{margin-bottom:1.1em}

/* ═══ PRINT SCREEN ═══ */
.print-screen{padding-bottom:40px}
.print-hero{background:linear-gradient(135deg,#4a5e3a 0%,#2d3d2b 100%);color:#fff;padding:32px 20px 28px;text-align:center;position:relative;overflow:hidden}
.print-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(196,168,130,.18) 0%,transparent 60%)}
.ph-icon{font-size:2.5rem;margin-bottom:10px;position:relative}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;margin-bottom:8px;position:relative}
.ph-sub{font-size:.82rem;color:rgba(255,255,255,.7);line-height:1.6;max-width:280px;margin:0 auto;position:relative}

.print-steps{padding:20px 16px 0}
.step-block{margin-bottom:22px}
.step-lbl{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:#929b80;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.step-n{width:20px;height:20px;border-radius:50%;background:#929b80;color:#fff;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}

/* THEME GRID */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.theme-card{border:2px solid #c4cdb0;border-radius:10px;padding:12px 10px;cursor:pointer;text-align:center;background:#edf0e6;-webkit-tap-highlight-color:transparent;transition:border-color .2s}
.theme-card.sel{border-color:#929b80}
.theme-card:active{opacity:.85}
.th-preview{width:100%;height:56px;border-radius:6px;margin-bottom:7px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.72rem;color:#fff;overflow:hidden}
.th-name{font-size:.75rem;color:#3d4a30}

/* PHOTO */
.photo-area{border:2px dashed #c4cdb0;border-radius:10px;padding:22px 16px;text-align:center;cursor:pointer;background:#edf0e6}
.photo-area:active{border-color:#929b80;background:#f0ebe3}
#photoPreview{width:100%;max-height:180px;object-fit:cover;border-radius:8px;display:none}
.photo-hint{font-size:.82rem;color:#929b80;line-height:1.5}
.photo-hint strong{display:block;font-family:'Cormorant Garamond',serif;font-size:1rem;color:#3d4a30;margin-bottom:4px;font-weight:400}
input[type=file]{display:none}

/* FIELDS */
.field-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field-label{font-size:.75rem;color:#929b80}
.field-input{width:100%;padding:11px 14px;border:1px solid #c4cdb0;border-radius:8px;background:#edf0e6;font-family:'Cormorant Garamond',serif;font-size:1rem;color:#181d10;outline:none}
.field-input:focus{border-color:#929b80}
.field-ta{min-height:80px;resize:vertical;line-height:1.6}

/* LIVE PREVIEW */
.preview-wrap{padding:0 16px;margin-bottom:20px}
.preview-lbl{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#929b80;font-weight:500;margin-bottom:10px}
.book-preview{width:100%;max-width:200px;margin:0 auto;border-radius:3px 10px 10px 3px;box-shadow:-4px 0 0 #333,-6px 2px 12px rgba(0,0,0,.25),0 4px 20px rgba(0,0,0,.15);overflow:hidden;position:relative;aspect-ratio:2/3;display:flex;flex-direction:column}
.bp-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.32}
.bp-overlay{position:absolute;inset:0}
.bp-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:18px;text-align:center}
.bp-pub{font-size:.4rem;letter-spacing:.12em;text-transform:uppercase;opacity:.6;margin-bottom:14px}
.bp-name{font-family:'Cormorant Garamond',serif;font-size:.68rem;font-weight:300;opacity:.8;margin-bottom:5px;letter-spacing:.04em}
.bp-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;line-height:1.15}
.bp-line{width:28px;height:1px;margin:9px auto;opacity:.55}
.bp-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.48rem;opacity:.72;line-height:1.5;max-width:110px}
.bp-dedica{font-size:.43rem;opacity:.52;margin-top:auto;font-style:italic;padding-top:8px}

/* ACTION BUTTONS */
.action-section{padding:0 16px}
.action-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;margin-bottom:14px;color:#3d4a30;text-align:center}
.action-btn{display:flex;align-items:center;gap:14px;width:100%;padding:15px 18px;border-radius:12px;border:none;cursor:pointer;margin-bottom:10px;text-align:left;font-family:'Jost',sans-serif}
.action-btn:active{opacity:.88}
.ab-primary{background:#929b80;color:#fff;box-shadow:0 4px 16px rgba(90,110,87,.3)}
.ab-secondary{background:#edf0e6;color:#181d10;border:1px solid #c4cdb0}
.ab-amazon{background:#ff9900;color:#111}
.ab-icon{font-size:1.5rem;flex-shrink:0}
.ab-text{flex:1}
.ab-title{font-size:.92rem;font-weight:500;display:block}
.ab-sub{font-size:.72rem;opacity:.75;display:block;margin-top:2px;line-height:1.4}

/* STATS ROW */
.stats-row{display:flex;border-bottom:1px solid #c4cdb0}
.stat-cell{flex:1;padding:14px 16px;text-align:center}
.stat-cell+.stat-cell{border-left:1px solid #c4cdb0}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:#181d10}
.stat-l{font-size:.67rem;color:#929b80;letter-spacing:.08em}

/* CROSS-SELL BOX */
.cross-sell{margin:0 16px 16px;padding:14px 16px;background:#fff9f0;border:1px solid #f0d9b0;border-radius:10px}
.cs-title{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:#7a5a30;margin-bottom:5px}
.cs-sub{font-size:.78rem;color:#3d4a30;line-height:1.5;margin-bottom:10px}
.cs-btn{display:inline-block;padding:8px 18px;background:#ff9900;color:#111;border-radius:6px;font-size:.8rem;font-family:'Jost',sans-serif;text-decoration:none}

/* LOADING */
#loading-overlay{position:fixed;inset:0;background:rgba(244,239,233,.93);z-index:900;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading-overlay.show{display:flex}
.lo-spin{width:40px;height:40px;border:3px solid #c4cdb0;border-top-color:#929b80;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lo-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#3d4a30}

#toast-msg{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:#2a2820;color:#fff;padding:9px 20px;border-radius:50px;font-size:.82rem;z-index:999;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .25s}

function sg(k){try{return localStorage.getItem(k)||'';}catch(e){return '';}}
function ss(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function sk(id,i){return 'lmv_'+id+'_'+i;}
function hasTxt(ch){return ch.sc.some(function(_,i){return sg(sk(ch.id,i)).length>0;});}
function totalWords(){var w=0;CHAPTERS.forEach(function(ch){ch.sc.forEach(function(_,i){var t=sg(sk(ch.id,i)).trim();if(t)w+=t.split(/\s+/).length;});});return w;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* CHAPTER DETAIL */
function openChapter(id){
  var ch=null;
  for(var i=0;i<CHAPTERS.length;i++){if(CHAPTERS[i].id===id){ch=CHAPTERS[i];break;}}
  if(!ch)return;
  currentCh=ch;view='chapter';
  setTitle(ch.t);
  document.getElementById('backBtn').style.display='flex';
  setBn('chapters');
  var h='<div><div class="ch-hero '+ch.hc+'">'+
    '<div class="ch-num-lbl">Capitolo '+esc(ch.n)+'</div>'+
    '<div class="ch-title-lbl">'+esc(ch.t)+'</div>'+
    '<div class="ch-quote">'+esc(ch.q)+'</div></div>'+
    '<div class="ch-qs"><div class="qs-lbl">Domande guida</div>';
  ch.qs.forEach(function(q){h+='<div class="q-row"><div class="q-dot"></div><div class="q-txt">'+esc(q)+'</div></div>';});
  h+='</div><div class="write-wrap">';
  ch.sc.forEach(function(sec,i){
    var saved=sg(sk(ch.id,i));
    h+='<div class="write-card"><div class="write-hd"><span class="wh-lbl">'+esc(sec)+'</span>'+
      '<span class="wh-cc" id="cc-'+ch.id+'-'+i+'">'+(saved.length?saved.length+' car.':'')+'</span></div>'+
      '<textarea class="ta" data-id="'+ch.id+'" data-i="'+i+'" placeholder="Scrivi liberamente qui...">'+esc(saved)+'</textarea></div>';
  });
  h+='</div><div class="save-row"><button class="save-btn" id="chSave">&#128190; Salva</button></div>'+
    '<div class="cross-sell">'+
      '<div class="cs-title">Vuoi anche il libro fisico?</div>'+
      '<div class="cs-sub">Acquista la versione cartacea su Amazon — da tenere, regalare o dedicare.</div>'+
      '<a class="cs-btn" href="https://amzn.eu/d/05HQ8iaj" target="_blank">&#128722; Vedi su Amazon</a>'+
    '</div>';
  var idx=CHAPTERS.indexOf(ch);
  h+='<div class="nav-row">';
  if(idx>0)h+='<button class="nav-prev" data-go="'+CHAPTERS[idx-1].id+'">&#8249; Precedente</button>';
  else h+='<div style="flex:1"></div>';
  if(idx<CHAPTERS.length-1)h+='<button class="nav-next" data-go="'+CHAPTERS[idx+1].id+'">Successivo &#8250;</button>';
  h+='</div></div>';
  document.getElementById('content').innerHTML=h;
  document.getElementById('content').scrollTop=0;
  document.getElementById('chSave').addEventListener('click',doSave);
  document.querySelectorAll('.nav-prev,.nav-next').forEach(function(b){
    b.addEventListener('click',function(){openChapter(this.getAttribute('data-go'));});
  });
}

function onType(ta){
  var id=ta.getAttribute('data-id'),i=ta.getAttribute('data-i'),v=ta.value;
  var cc=document.getElementById('cc-'+id+'-'+i);
  if(cc)cc.textContent=v.length?v.length+' car.':'';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){ss(sk(id,parseInt(i)),v);flashTitle();},900);
}

function applyThemePreview(){
  var th=PS.theme;
  var bp=document.getElementById('bookPreview');
  if(!bp)return;
  bp.style.background=th.bg;
  var ov=document.getElementById('bpOverlay');if(ov)ov.style.background=th.ov;
  var ln=document.getElementById('bpLine');if(ln)ln.style.background=th.lc;
  var bc=document.getElementById('bpContent');if(bc)bc.style.color=th.tc;
}
function updatePhotoPreview(){
  var ph=document.getElementById('bpPhoto');
  if(ph&&PS.photo){ph.style.backgroundImage='url('+PS.photo+')';ph.style.opacity='0.32';}
}

/* PDF GENERATION */
function generatePDF(){
  if(totalWords()<10){showToast('&#9997; Scrivi almeno qualche parola prima di generare il PDF!');return;}
  showLoading('Preparazione del tuo libro...');
  setTimeout(function(){
    try{buildPDF();}catch(e){hideLoading();showToast('&#9888; Errore nella generazione.');console.error(e);}
  },150);
}

function buildPDF(){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a5'});
  var W=148,H=210,ML=16,MR=16,MT=18,MB=18,CW=W-ML-MR;
  var th=PS.theme,name=PS.name,dedica=PS.dedica,photo=PS.photo;
  var cc=th.bgc;
  var pn=2;

  /* COVER */
  for(var gy=0;gy<H;gy++){
    var t=gy/H;
    doc.setFillColor(Math.round(cc[0][0]*(1-t)+cc[1][0]*t),Math.round(cc[0][1]*(1-t)+cc[1][1]*t),Math.round(cc[0][2]*(1-t)+cc[1][2]*t));
    doc.rect(0,gy,W,1.1,'F');
  }
  if(photo){
    try{doc.addImage(photo,'PNG',0,0,W,H,'','FAST');}catch(e2){}
  }
  /* bottom shadow overlay */
  for(var gy2=H*0.5;gy2<H;gy2++){
    var a=((gy2-H*0.5)/(H*0.5))*0.6;
    doc.setFillColor(0,0,0);
    if(doc.setGState)try{doc.setGState(new doc.GState({opacity:a}));}catch(e3){}
    doc.rect(0,gy2,W,1,'F');
  }
  if(doc.setGState)try{doc.setGState(new doc.GState({opacity:1}));}catch(e4){}

  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setCharSpace(1.2);
  doc.text('STUDIO B. — LIBRIDASCRIVERE.COM',W/2,20,{align:'center'});doc.setCharSpace(0);

  var ty=name?60:65;
  if(name){doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(220,200,170);doc.text('Il libro di '+name,W/2,52,{align:'center'});}
  doc.setFont('times','normal');doc.setFontSize(26);doc.setTextColor(255,255,255);
  doc.text('Il Libro',W/2,ty,{align:'center'});
  doc.text('della Mia Vita',W/2,ty+10,{align:'center'});
  doc.setDrawColor(196,168,130);doc.setLineWidth(0.4);doc.line(W/2-16,ty+14,W/2+16,ty+14);
  doc.setFont('times','italic');doc.setFontSize(7.5);doc.setTextColor(210,200,185);
  var sy=ty+21;
  ['Diario guidato per raccogliere','ricordi, emozioni e lezioni','da lasciare a chi ami'].forEach(function(l){doc.text(l,W/2,sy,{align:'center'});sy+=5.5;});

  /* helpers */
  function newPage(){
    doc.addPage();
    doc.setFillColor(250,247,243);doc.rect(0,0,W,H,'F');
    doc.setDrawColor(221,215,207);doc.setLineWidth(0.12);
    for(var ly=28;ly<H-MB;ly+=7)doc.line(ML,ly,W-MR,ly);
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(138,132,122);
    doc.text(String(pn++),W/2,H-6,{align:'center'});
    doc.setDrawColor(90,110,87);doc.setLineWidth(0.3);
    doc.line(ML,MT-2,W-MR,MT-2);
    doc.line(ML,H-MB+4,W-MR,H-MB+4);
  }

  /* DEDICA */
  if(dedica){
    newPage();
    doc.setFont('times','italic');doc.setFontSize(10);doc.setTextColor(42,40,32);
    var dlines=doc.splitTextToSize(dedica,CW);
    var dy=H/2-dlines.length*4;
    dlines.forEach(function(l){doc.text(l,W/2,dy,{align:'center'});dy+=7;});
  }

  /* INDEX */
  newPage();
  doc.setFont('times','normal');doc.setFontSize(16);doc.setTextColor(42,40,32);
  doc.text('Indice',W/2,MT+6,{align:'center'});
  doc.setDrawColor(90,110,87);doc.setLineWidth(0.4);doc.line(W/2-12,MT+9,W/2+12,MT+9);
  var iy=MT+17;
  CHAPTERS.forEach(function(ch){
    if(iy>H-MB-8){newPage();iy=MT+8;}
    doc.setFont('times','normal');doc.setFontSize(8);doc.setTextColor(42,40,32);
    doc.text((typeof ch.n==='number'?ch.n+'. ':'')+ch.t,ML,iy);iy+=6.5;
  });

  /* CHAPTERS */
  var chColors={c1:[74,103,65],c2:[90,94,122],c3:[122,90,69],c4:[138,74,85],c5:[74,122,106],c6:[106,90,58],c7:[58,90,106],c8:[90,58,106],c9:[106,58,58],c10:[58,106,90],c11:[74,74,106],c12:[106,106,58],c13:[90,74,106],c14:[58,90,74],c15:[106,90,74],rif:[61,79,59]};
  CHAPTERS.forEach(function(ch){
    var hasAny=ch.sc.some(function(_,i){return sg(sk(ch.id,i)).trim().length>0;});
    if(!hasAny)return;
    doc.addPage();pn++;
    var hc=chColors[ch.id]||[74,103,65];
    for(var hy=0;hy<82;hy++){
      var ht=hy/82;
      doc.setFillColor(Math.round(hc[0]*(1-ht*0.4)),Math.round(hc[1]*(1-ht*0.4)),Math.round(hc[2]*(1-ht*0.4)));
      doc.rect(0,hy,W,1.1,'F');
    }
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setCharSpace(1);
    doc.text('CAPITOLO '+(typeof ch.n==='number'?ch.n:ch.n),ML,15);doc.setCharSpace(0);
    doc.setFont('times','normal');doc.setFontSize(18);
    var tl=doc.splitTextToSize(ch.t,CW),ty2=24;
    tl.forEach(function(l){doc.text(l,ML,ty2);ty2+=7;});
    doc.setDrawColor(196,168,130);doc.setLineWidth(0.4);doc.line(ML,ty2+1,ML+20,ty2+1);ty2+=5;
    doc.setFont('times','italic');doc.setFontSize(7.5);doc.setTextColor(220,210,195);
    doc.splitTextToSize(ch.q,CW).forEach(function(l){doc.text(l,ML,ty2);ty2+=5;});

    ch.sc.forEach(function(sec,si){
      var txt=sg(sk(ch.id,si)).trim();if(!txt)return;
      newPage();
      doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(138,132,122);
      doc.setCharSpace(1);doc.text(sec.toUpperCase(),ML,MT+2);doc.setCharSpace(0);
      doc.setDrawColor(90,110,87);doc.setLineWidth(0.3);doc.line(ML,MT+4,ML+18,MT+4);
      var ty3=MT+11;
      doc.setFont('times','normal');doc.setFontSize(9.5);doc.setTextColor(42,40,32);
      txt.split('\n').forEach(function(p){
        if(!p.trim()){ty3+=3.5;return;}
        doc.splitTextToSize(p,CW).forEach(function(l){
          if(ty3>H-MB-6){newPage();ty3=MT+8;}
          doc.text(l,ML,ty3);ty3+=6;
        });
        ty3+=2.5;
      });
    });
  });

  /* COLOPHON */
  newPage();
  doc.setFont('times','italic');doc.setFontSize(9.5);doc.setTextColor(90,85,78);
  var cols=['Questo libro è stato scritto da '+(name||'chi lo ha scritto')+'.','','Ogni parola è autentica.','Ogni storia merita di essere raccontata.','','— Studio B. / libridascrivere.com'];
  var cy=H/2-cols.length*4;
  cols.forEach(function(l){doc.text(l,W/2,cy,{align:'center'});cy+=7;});

  hideLoading();
  var fname='il_libro_di_'+(name?name.replace(/\s+/g,'_').toLowerCase():'mia_vita')+'_'+new Date().getFullYear()+'.pdf';
  doc.save(fname);
  showToast('&#128196; PDF generato! Controlla i download.');
}

/* SAVE / EXPORT */
function doSave(){
  document.querySelectorAll('textarea.ta').forEach(function(ta){
    var id=ta.getAttribute('data-id'),i=ta.getAttribute('data-i');
    if(id!==null&&i!==null)ss(sk(id,parseInt(i)),ta.value);
  });
  flashTitle();showToast('&#10003; Salvato');
}
function flashTitle(){
  var el=document.getElementById('topTitle');
  el.style.color='#929b80';
  setTimeout(function(){el.style.color='';},1400);
}
function doExport(){
  var out='IL LIBRO DELLA MIA VITA\n'+'='.repeat(36)+'\n';
  out+='Esportato il: '+new Date().toLocaleDateString('it-IT')+'\n\n';
  CHAPTERS.forEach(function(ch){
    var parts=[];
    ch.sc.forEach(function(sec,i){var t=sg(sk(ch.id,i)).trim();if(t)parts.push(sec.toUpperCase()+'\n'+t);});
    if(!parts.length)return;
    out+='\n'+'─'.repeat(36)+'\nCAP. '+ch.n+' — '+ch.t.toUpperCase()+'\n'+'─'.repeat(36)+'\n\n';
    out+=parts.join('\n\n')+'\n\n';
  });
  try{
    var blob=new Blob([out],{type:'text/plain;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='il_mio_diario.txt';a.click();
    URL.revokeObjectURL(url);showToast('&#128196; File scaricato');
  }catch(e){var w=window.open();if(w)w.document.write('<pre>'+out.replace(/</g,'&lt;')+'</pre>');}
}

function showLoading(msg){document.getElementById('loading-text').textContent=msg||'Caricamento...';document.getElementById('loading-overlay').classList.add('show');}
function hideLoading(){document.getElementById('loading-overlay').classList.remove('show');}

function showToast(msg){var t=document.getElementById('toast-msg');t.innerHTML=msg;t.style.opacity='1';setTimeout(function(){t.style.opacity='0';},2800);}
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();doSave();}});
</script>
